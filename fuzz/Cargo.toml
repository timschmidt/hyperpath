[package]
name = "hyperpath-fuzz"
version = "0.0.0"
edition = "2024"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
hyperlimit = { path = "../../hyperlimit", default-features = false }
hyperpath = { path = ".." }
hypermesh = { path = "../../hypermesh", default-features = false, features = ["exact-triangulation"] }

[[bin]]
name = "rectangular_prism_mesh_boolean"
path = "fuzz_targets/rectangular_prism_mesh_boolean.rs"
test = false
doc = false
bench = false

